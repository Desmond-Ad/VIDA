<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="VIDA - Purchase Order Page">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VIDA">
    <title>Purchase Order page</title>
    <link rel="icon" type="image/x-icon" href="/images/DIVA.png">
    <link rel="apple-touch-icon" href="/images/DIVA.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/cs/purchase.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
</head>
<body>
    <div>
        <h1>Purchase Order</h1>
        <form id="purchaseForm" action="#" method="post">
            <label for="name">Customer Name:</label>
            <input type="text" id="name" name="name" placeholder="Customer Name" required>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="+234xxxxxxxxxxx" required>

            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" placeholder=" Amt bag of water" required>

            <label for="totalAmount">Total Amount:</label>
            <input type="text" id="totalAmount" name="totalAmount" placeholder="Total Amount" readonly style="background:#f0f0f0;">

            <label for="amountPaid">Payment</label>
            <input type="number" id="amountPaid" name="amountPaid" placeholder="Amount Paid" min="0" step="0.01" required>
            <button id="submitBtn" class="submit">Submit</button>
        </form>
        <br>
        <div id="dailyTotals"></div>
        <input type="text" id="searchInput" placeholder="Search by Customer Name">
        <table id="entriesTable">
            <thead>
                <tr>
                    <th>Customer Name</th>
                    <th>ID Number</th>
                    <th>Phone Number</th>
                    <th>Date&Time</th>
                    <th>Amount Paid</th>
                    <th>Amount Owed</th>
                    <th>Number of Bags (Quantity)</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Custom Yes/No Modal -->
    <div id="customModal" style="display:none;">
        <div class="modal-content">
            <div id="modalMessage"></div>
            <div class="modal-buttons">
                <button id="modalYes">Yes</button>
                <button id="modalNo">No</button>
            </div>
        </div>
    </div>

    <!-- Config + Auth module (config must load before auth) -->
    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/purchase.js"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(registration => {
                console.log('Service Worker registered:', registration);
            }).catch(err => {
                console.log('Service Worker registration failed:', err);
            });
        }
    </script>
</body>
</html>
